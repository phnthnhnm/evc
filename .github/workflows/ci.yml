name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: "stable"
          channel: "stable"
      - run: flutter pub get
      - run: flutter analyze

  format:
    name: Format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: "stable"
          channel: "stable"
      - run: dart format --set-exit-if-changed lib/ test/

  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: "stable"
          channel: "stable"
      - run: flutter pub get
      - run: flutter test --coverage

  build:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: "stable"
          channel: "stable"
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
