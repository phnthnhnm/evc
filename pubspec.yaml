name: evc
description: Flutter app for Echo value calculations with resonator browsing and scoring
publish_to: "none"
version: 3.1.0

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  package_info_plus: ^10.2.0
  file_picker: ">=12.0.0-beta.4 <13.0.0"
  path_provider: ^2.1.6
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  riverpod: ^3.3.2
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/attribute_icons/
    - assets/resonator_icons/
    - assets/resonator_portraits/
    - assets/stat_icons/
    - assets/weapon_icons/
    - assets/data/
